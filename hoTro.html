<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hỗ Trợ</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #ffffff;
    }
    .header {
      background-color: #ff6600;
      color: white;
      padding: 20px;
      text-align: center;
    }
    .header h1 {
      margin-bottom: 10px;
    }
    .search-bar {
      display: flex;
      justify-content: center;
      align-items: center;
      max-width: 600px;
      margin: 0 auto;
    }
    .search-bar input {
      width: 80%;
      padding: 10px;
      border: none;
      border-radius: 5px 0 0 5px;
    }
    .search-bar button {
      width: 20%;
      padding: 10px;
      border: none;
      border-radius: 0 5px 5px 0;
      background-color: #185cc9;
      color: white;
    }
    .note {
      background-color: #ffffff;
      color: #0516ff;
      padding: 10px;
      text-align: center;
      margin: 20px 0;
      border-radius: 5px;
    }
    .categories {
      display: flex;
      justify-content: space-around;
      margin-top: 30px;
    }
    .category {
      text-align: center;
      padding: 20px;
      background-color: #ffffff;
      border: 1px solid #ccc;
      border-radius: 10px;
      width: 150px;
      cursor: pointer;
      transition: transform 0.3s;
    }
    .category:hover {
      transform: scale(1.05);
    }
    .category i {
      font-size: 40px;
      color: #ff6600;
    }
    .category h5 {
      margin-top: 10px;
      font-size: 16px;
      font-weight: bold;
    }
  </style>
</head>

<body>
  <!--nav-->
  <div class="header">
    <h1>Xin chào, Chúng tôi có thể giúp gì cho bạn?</h1>

    <!--thanh tìm kiếm-->
    <div class="search-bar">
      <input type="text" placeholder="Nhập từ khóa hoặc nội dung bạn cần tìm">
      <button><i class="fas fa-search"></i></button>
    </div>
  </div>

  <!--banner-->
  <div class="note">
    Từ 29/12/2025 đến 02/1/2026, sẽ có nhiều ưu đại nhân dịp Tết dương lịch 2026.
  </div>

  <!--danh sách-->
  <div class="container">
    <h3 class="text-center mb-4">Danh mục</h3>

    <div class="categories">

      <a href="trangChu.html">
      <div class="category">
          <i class="fas fa-shopping-cart"></i>
          <h5>Mua Sắm</h5>
        </div>
      </a>

      <a href="">
        <div class="category">
          <i class="fas fa-tag"></i>
          <h5>Khuyến Mãi & Ưu Đãi</h5>
        </div>
      </a>

      <a href="dangKi.html">
        <div class="category">
          <i class="fas fa-user"></i>
          <h5>Tạo tài khoản</h5>
        </div>
      </a>

      <a href="trangQLTaiKhoan.html">
        <div class="category">
          <i class="fas fa-credit-card"></i>
          <h5>Thanh Toán</h5>
        </div>
      </a>

      <a href="trangQLTaiKhoan.html">
        <div class="category">
          <i class="fas fa-truck"></i>
          <h5>Đơn Hàng & Vận Chuyển</h5>
        </div>
      </a>

    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
