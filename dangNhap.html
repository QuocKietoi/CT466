<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Đăng Nhập</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
.modal-footer {
    padding: 15px 20px;
    background: #f8f9fa;
}
  </style>
</head>

<body>
  <div class="signup-login-box">
      <div class="modal-header justify-content-center">
        <h5>Đăng nhập</h5>
      </div>
        
      <div class="modal-body">
        <form>
          <div class="login">
            <label> <i class="fa fa-user"></i>Tên đăng nhập</label>
            <input type="text" class="form-control" placeholder="Nhập tên đăng nhập">
          </div>
          <div class="email">
            <label class="form-label"><i class="fa fa-envelope-square"></i>Email/số điện thoại</label>
            <input  class="form-control" placeholder="Nhập email/số điện thoại">
          </div>

          <div class="OTP">
            <label class="form-label"><i class="fa fa-mobile-alt"></i>Mã OTP</label>
            <input  class="form-control" placeholder="Nhập mã OTP">
          </div>

          <div>
            <input class="form-check-input" type="checkbox">
            <label class="form-check-label">Ghi nhớ đăng nhập</label>
          </div>

          <div class="modal-footer d-flex justify-content-center w-100">
            <div class="d-flex gap-3 w-100">
              <a href="http://127.0.0.1:5500/trangChu.html" class="btn btn-success w-50">
                <i>Đăng nhập</i>
              </a>

              <button type="button" class="btn btn-danger w-50">
                <i>Hủy bỏ</i>
              </button>
            </div>
          </div>
        </form>

        <small>
          Bạn chưa đăng kí tài khoản?
          <a href="http://127.0.0.1:5500/dangKi.html">Đăng kí</a><br>
          Bạn quên mật khẩu?
          <a href="http://127.0.0.1:5500/hoTro.html">Hỗ trợ?</a>
        </small>
      </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
