<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Trang sản phẩm</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    .product {
      transition: 0.3s;
    }
    .product:hover {
      transform: translateY(-5px);
    }
    .product-img {
      height: 220px;
      object-fit: cover;
      border-radius: 5px;
    }
    .old-price {
      text-decoration: line-through;
      color: gray;
      font-size: 14px;
    }
    .new-price {
      color: #ff0000;
      font-weight: bold;
      font-size: 18px;
    }
    .header {
    background-color: #ff6600;
    color: white;
    padding: 20px;
    text-align: center;
  }
  </style>
</head>

<body class="bg-light">

  <div class="container py-4">
        <div class="header">
        <h2 class="mb-4 text-center">SẢN PHẨM HIỆN ĐANG KHUYẾN MÃI</h2>
    </div>
 

    <div class="row g-4">

      <div class="col-md-4">
        <div class="card product p-2">
          <img src="Images/1.png" class="product-img">
          <div class="card-body text-center">
            <h5>Kẹp tóc kiểu 1</h5>
            <div>
              <span class="new-price">17.000đ</span>
              <span class="old-price">29.000đ</span>
            </div>
            <button class="btn btn-primary mt-3 w-100">Thêm vào giỏ hàng</button>
          </div>
        </div>
      </div>

      <!-- Sản phẩm 2 -->
      <div class="col-md-4">
        <div class="card product p-2">
          <img src="Images/2.png" class="product-img">
          <div class="card-body text-center">
            <h5>Kẹp tóc kiểu 2</h5>
            <div>
              <span class="new-price">20.000đ</span>
              <span class="old-price">31.000đ</span>
            </div>
            <button class="btn btn-primary mt-3 w-100">Thêm vào giỏ hàng</button>
          </div>
        </div>
      </div>

      <!-- Sản phẩm 3 -->
      <div class="col-md-4">
        <div class="card product p-2">
          <img src="Images/3.png" class="product-img">
          <div class="card-body text-center">
            <h5">Kẹp tóc kiểu 3</h5>
            <div>
              <span class="new-price">15.000đ</span>
              <span class="old-price">22.000đ</span>
            </div>
            <button class="btn btn-primary mt-3 w-100">Thêm vào giỏ hàng</button>
          </div>
        </div>
      </div>

      <!-- Sản phẩm 4 -->
      <div class="col-md-4">
        <div class="card product p-2">
          <img src="Images/red.png" class="product-img">
          <div class="card-body text-center">
            <h5>Áo phông màu đỏ</h5>
            <div>
              <span class="new-price">150.000đ</span>
              <span class="old-price">259.000đ</span>
            </div>
            <button class="btn btn-primary mt-3 w-100">Thêm vào giỏ hàng</button>
          </div>
        </div>
      </div>

      <!-- Sản phẩm 5 -->
      <div class="col-md-4">
        <div class="card product p-2">
          <img src="Images/pink.png" class="product-img">
          <div class="card-body text-center">
            <h5>Áo phông màu hồng</h5>
            <div>
              <span class="new-price">150.000đ</span>
              <span class="old-price">259.000đ</span>
            </div>
            <button class="btn btn-primary mt-3 w-100">Thêm vào giỏ hàng</button>
          </div>
        </div>
      </div>

      <!-- Sản phẩm 6 -->
      <div class="col-md-4">
        <div class="card product p-2">
          <img src="Images/blue.png" class="product-img">
          <div class="text-center">
            <h5 >Áo phông màu xanh dương</h5>
            <div>
              <span class="new-price">150.000đ</span>
              <span class="old-price">259.000đ</span>
            </div>
            <button class="btn btn-primary mt-3 w-100">Thêm vào giỏ hàng</button>
          </div>
        </div>
</body>
</html>
