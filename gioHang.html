<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Giỏ hàng</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
<style>
  .navbar {
    display: flex;
    justify-content: center;
    align-items: center;
    background: #ff6600;
    height: 120px;
}

  .cart-img {
    width: 100px;
    height: 100px;
    object-fit: cover;
    border-radius: 6px;
  }
  .header {
    background-color: #ff6600;
    color: white;
    padding: 20px;
    text-align: center;
  }
  .payment-box {
    background: #fff;
    border-radius: 10px solid;
    padding: 15px;
    border: 1px;
  }
</style>
</head>

<body class="bg-light">
  
  <nav class="navbar">
    <h3 class="text-white m-0">GIỎ HÀNG</h3>
  </nav>
  <div class="container py-4">

    <!-- ĐỊA CHỈ GIAO HÀNG -->
    <div class="payment-box mb-4">
      <h5>Địa chỉ giao hàng</h5>

      <div class="mb-2">
        <label class="form-label">Họ và tên</label>
        <input type="text" class="form-control" placeholder="Nhập họ tên">
      </div>

      <div class="mb-2">
        <label class="form-label">Số điện thoại</label>
        <input type="text" class="form-control" placeholder="Nhập số điện thoại">
      </div>

      <div class="mb-2">
        <label class="form-label">Địa chỉ</label>
        <input type="text" class="form-control" placeholder="Số nhà, tên đường...">
      </div>
    </div>

    <!-- SẢN PHẨM TRONG GIỎ -->
    <div class="row g-4">

    <!--SP1-->
    <div class="col-12">
      <div class="cart-item d-flex align-items-center gap-3">

        <input type="checkbox" class="form-check-input" style="transform: scale(1.3);">

        <img src="Images/red.png" class="cart-img">

        <div class="flex-grow-1">
          <h6>Áo phông màu đỏ</h6>

          <!--kích thước-->
          <div class="d-flex gap-2 mb-2">
            <select class="form-select w-auto">
              <option>Size S</option>
              <option>Size M</option>
              <option>Size L</option>
              <option>Size XL</option>
            </select>
          </div>
          <p class="mb-1 text-danger fw-bold price" data-price="150000">150.000đ</p>
        </div>

      <!--thay đổi số lượng-->
        <div class="d-flex align-items-center">
          <button class="btn btn-outline-secondary qty-btn">-</button>
          <input type="text" class="form-control text-center mx-1" style="width: 50px;" value="1">
          <button class="btn btn-outline-secondary qty-btn">+</button>
        </div>

        <!--xóa sản phẩm-->
        <button class="btn btn-outline-danger ms-3 delete-btn">
          <i class="fa-solid fa-trash"></i>
        </button>
      </div>
    </div>

    <!--SP 2-->
    <div class="col-12">
      <div class="cart-item d-flex align-items-center gap-3">

        <input type="checkbox" class="form-check-input" style="transform: scale(1.3);">

        <img src="Images/pink.png" class="cart-img">

        <div class="flex-grow-1">
          <h6>Áo phông màu hồng</h6>

          <!--kích thước sản phẩm-->
          <div class="d-flex gap-2 mb-2">
            <select class="form-select w-auto">
              <option>Size S</option>
              <option>Size M</option>
              <option>Size L</option>
              <option>Size XL</option>
            </select>
          </div>
          <p class="mb-1 text-danger fw-bold price" data-price="150000">150.000đ</p>
        </div>

        <!--thay đổi số lượng-->
        <div class="d-flex align-items-center">
          <button class="btn btn-outline-secondary qty-btn">-</button>
          <input type="text" class="form-control text-center mx-1" style="width: 50px;" value="1">
          <button class="btn btn-outline-secondary qty-btn">+</button>
        </div>

        <!--xóa sản phẩm-->
        <button class="btn btn-outline-danger ms-3 delete-btn">
          <i class="fa-solid fa-trash"></i>
        </button>
      </div>
    </div>
  </div>

  <!--cách thanh toán-->
  <div class="payment-box mt-4">

    <h5>Phương thức thanh toán</h5>

    <div class="mt-2">
      <div class="form-check">
        <input class="form-check-input" type="radio" name="payment" checked>
        <label class="form-check-label">Thanh toán khi nhận hàng (COD)</label>
      </div>

      <div class="form-check">
        <input class="form-check-input" type="radio" name="payment">
        <label class="form-check-label">Ví điện tử</label>
      </div>

      <div class="form-check">
        <input class="form-check-input" type="radio" name="payment">
        <label class="form-check-label">Chuyển khoản ngân hàng</label>
      </div>
    </div>
  </div>

  <!--tính tổng tiền và đặt hàng-->
  <div class="payment-box mt-4">
    <h5 class="text-end mt-3">
      Tổng tiền: <span id="total-price" class="text-danger">0đ</span>
    </h5>
    <a href="http://127.0.0.1:5500/trangQLTaiKhoan.html" class="btn btn-success w-100 mt-3">
      <i class="fa-solid fa-check me-2"></i>Đặt hàng
    </a>
  </div>
</div>

<script src="script.js" defer></script>
</body>
</html>
