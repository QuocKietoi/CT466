<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Đăng Kí</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="signup-login-box">
      <div class="modal-header justify-content-center">
        <h5>Đăng Kí</h5>
      </div>
        
        <div class="body-frame">
          <form action="register.php" method="POST">
            <div class="login">
              <label> <i class="fa fa-user"></i>Tên đăng nhập</label>
              <input type="text" name="username" class="form-control" placeholder="Nhập tên đăng nhập">
            </div>
            <div class="email">
              <label class="form-label"><i class="fa fa-envelope-square"></i>Email/số điện thoại</label>
              <input name="email" class="form-control" placeholder="Nhập email/số điện thoại">
            </div>
            <div class="password">
              <label for="password" class="form-label"><i class="fa fa-eye"></i>Mật khẩu</label>
              <input type="password" name="password" class="form-control" placeholder="Nhập mật khẩu">
            </div>
            <div class="password-again">
              <label for="password" class="form-label"><i class="fa fa-eye"></i>Xác nhận lại mật khẩu</label>
              <input type="password" name="confirm_password" class="form-control" placeholder="Nhập lại mật khẩu">
            </div>

            <div class="d-flex gap-3 w-100">
              <button type="submit"
                class="btn btn-success w-50"
                onclick="window.location.href='http://dangNhap.html'">
              <i>Đăng kí</i>
              </button>

              <button type="button"
              class="btn btn-danger w-50"
              onclick="window.location.href='http://127.0.0.1:5500/dangNhap.html'">
              <i>Quay lại</i>
              </button>
            </div>
          </div>
        </div>
        </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
